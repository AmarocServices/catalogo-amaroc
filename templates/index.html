<!DOCTYPE html>
<html>
<head>
<style>
    * {
    box-sizing: border-box;
}
body {
    text-align:center;
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

.header {
background: linear-gradient(90deg,#ff0057,#6a00ff);
color:white; padding:15px;
}

.logo { width:720px; margin-top:20px;}

.btn {
display:block;
width:300px;
margin:12px auto;
padding:14px;
background: linear-gradient(90deg,#ff0057,#6a00ff);
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
font-size:15px;
transition: all 0.3s ease;
box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* EFECTO HOVER */
.btn:hover {
transform: scale(1.05);
opacity:0.9;
}

/* EFECTO CLICK */
.btn:active {
transform: scale(0.97);
box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.social-left {
position:fixed;
bottom:20px;
left:20px;
}

.social-right {
position:fixed;
bottom:20px;
right:20px;
}

.social-left img,
.social-right img {
width:60px;
margin:5px;
cursor:pointer;
}

/* 🔥 AJUSTE PARA CELULAR */
@media (max-width: 768px) {

    /* LOGO MÁS PEQUEÑO */
    .logo {
        width: 90%;
        max-width: 320px;
        margin-top: 15px;
    }

    /* BOTONES MÁS GRANDES */
    .btn {
        width: 90%;
        padding: 15px;
        font-size: 16px;
        border-radius: 12px;
    }

    /* HEADER MÁS COMPACTO */
    .header {
        font-size: 14px;
        padding: 10px;
    }

    /* ICONOS MÁS PEQUEÑOS Y MEJOR POSICIÓN */
    .social-left img,
    .social-right img {
        width: 1080px;
    }

    .social-left {
        bottom: 10px;
        left: 10px;
    }

    .social-right {
        bottom: 10px;
        right: 10px;
    }

}
</style>
</head>

<body>

<div class="header">CATÁLOGO DE PRODUCTOS</div>

<img src="/static/img/Logo/logo.png" class="logo">

<a href="/catalogo/alarmas" class="btn">ALARMAS</a>
<a href="/catalogo/control_acceso" class="btn">CONTROL DE ACCESO</a>
<a href="/catalogo/deteccion_incendios" class="btn">DETECCIÓN DE INCENDIOS</a>
<a href="/catalogo/energia" class="btn">ENERGÍA</a>
<a href="/catalogo/redes" class="btn">REDES</a>
<a href="/catalogo/telemetria" class="btn">TELEMETRÍA</a>
<a href="/catalogo/videovigilancia" class="btn">VIDEOVIGILANCIA</a>

<div class="social-left">

<!-- 🌐 WEB -->
<a href="https://www.amarocservices.com" target="_blank">
<img src="/static/img/Logo/web.png">
</a>

<!-- 👍 FACEBOOK -->
<a href="https://www.facebook.com/profile.php?id=61566330481089" target="_blank">
<img src="/static/img/Logo/facebook.png">
</a>

</div>

<div class="social-right">

<!-- 📲 WHATSAPP -->
<a href="https://wa.me/526624611574" target="_blank">
<img src="/static/img/Logo/whatsapp.png">
</a>

</div>

</body>
</html>
